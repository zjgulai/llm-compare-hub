      /* ── MKT Warm Theme Override ── */
      :root {

        --brand: #8C2C3E;

        border-color: #EDE6DF !important;
      }
      .pill-tab:hover {
        background-color: #FBE7EA !important;
        color: #C94F66 !important;
        border-color: #C94F66 !important;
      }
      /* Pill tab 激活态 → mkt 玫红 */
      .pill-tab.active {
        background-color: #C94F66 !important;
        color: #FFFFFF !important;
        border-color: #C94F66 !important;
      }

      /* Cards */
      .card-elevated {
        border-color: #EDE6DF !important;
        box-shadow: 0 1px 3px rgba(0,0,0,.05), 0 1px 2px rgba(0,0,0,.03) !important;
