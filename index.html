    <style>
      /* mkt token 精确复刻
         bg:     #FBF8F5   nav: rgba(255,255,255,.9)
         accent: #C25B6E   card: #FFFFFF  border: rgba(0,0,0,.07)
         text-1: #231A1A   text-2: #6B6B70  text-3: #9CA3AF        */

      body { background-color: #FBF8F5 !important; color: #231A1A !important; }
      .min-h-screen { background-color: #FBF8F5 !important; }

      /* Header — white/translucent, no gradient */
      .relative.overflow-hidden {
        background: rgba(255,255,255,0.95) !important;
        background-image: none !important;
        border-bottom: 1px solid rgba(0,0,0,.06) !important;
        box-shadow: 0 1px 0 rgba(0,0,0,.04) !important;
      }
      .relative.overflow-hidden .absolute.inset-0,
      .relative.overflow-hidden .absolute.top-0.right-0 { display: none !important; }

      /* Logo icon */
      .relative.overflow-hidden .w-10.h-10.rounded-xl,
      .relative.overflow-hidden .w-8.h-8.rounded-xl,
      .relative.overflow-hidden .w-10.h-10.rounded-lg {
        background: rgba(194,91,110,.12) !important;
        background-image: none !important;
      }
      .relative.overflow-hidden .w-6.h-6.rounded-md,
      .relative.overflow-hidden .w-5.h-5.rounded-md {
        background: rgba(194,91,110,.1) !important;
        background-image: none !important;
      }

      /* Header text → dark on light bg */
      .relative.overflow-hidden .text-xl.font-bold { color: #231A1A !important; }
      .relative.overflow-hidden p,
      .relative.overflow-hidden .text-sm { color: #6B6B70 !important; }
      .relative.overflow-hidden .text-xs { color: #9CA3AF !important; }
      .relative.overflow-hidden .text-white { color: #231A1A !important; }

      /* Sticky nav bar */
      .sticky.top-0 {
        background: rgba(251,248,245,.96) !important;
        background-image: none !important;
        backdrop-filter: blur(12px) !important;
        -webkit-backdrop-filter: blur(12px) !important;
        border-bottom: 1px solid rgba(0,0,0,.06) !important;
      }

      /* Pill tabs */
      .pill-tab {
        background-color: transparent !important;
        color: #6B6B70 !important;
        border-color: rgba(0,0,0,.1) !important;
        font-weight: 500 !important;
      }
      .pill-tab:hover {
        background-color: rgba(194,91,110,.08) !important;
        color: #C25B6E !important;
        border-color: rgba(194,91,110,.3) !important;
      }
      .pill-tab.active {
        background-color: #C25B6E !important;
        color: #FFFFFF !important;
        border-color: #C25B6E !important;
      }

      /* Cards */
      .card-elevated {
        background-color: #FFFFFF !important;
        border-color: rgba(0,0,0,.07) !important;
        box-shadow: 0 1px 3px rgba(0,0,0,.04) !important;
      }
      .card-elevated:hover {
        border-color: rgba(194,91,110,.3) !important;
        box-shadow: 0 4px 16px rgba(194,91,110,.08) !important;
      }

      /* Background variants */
      .bg-slate-50, .bg-gray-50   { background-color: #FBF8F5 !important; }
      .bg-slate-100, .bg-gray-100 { background-color: #F4EFE9 !important; }
      .bg-white { background-color: #FFFFFF !important; }

      /* Borders */
      .border-slate-200, .border-gray-200, .border-slate-100 { border-color: rgba(0,0,0,.07) !important; }

      /* Typography */
      .text-slate-900, .text-gray-900 { color: #231A1A !important; }
      .text-slate-700, .text-gray-700 { color: #3D2E2E !important; }
      .text-slate-600, .text-gray-600, .text-slate-500, .text-gray-500 { color: #6B6B70 !important; }
      .text-slate-400, .text-gray-400 { color: #9CA3AF !important; }

      /* Accent (replace blue/indigo → mkt 玫红) */
      .text-blue-600, .text-indigo-600, .text-pink-600 { color: #C25B6E !important; }
      .text-blue-700, .text-indigo-700 { color: #A84A5A !important; }
      .bg-blue-600, .bg-indigo-600   { background-color: #C25B6E !important; }
      .bg-blue-50, .bg-indigo-50     { background-color: rgba(194,91,110,.08) !important; }
      .bg-blue-100, .bg-indigo-100   { background-color: rgba(194,91,110,.12) !important; }
      .border-blue-600, .border-indigo-600 { border-color: #C25B6E !important; }
      .hover\:bg-blue-700:hover      { background-color: #A84A5A !important; }
      .hover\:text-blue-600:hover    { color: #C25B6E !important; }

      /* Shadows */
      .shadow-sm { box-shadow: 0 1px 3px rgba(0,0,0,.04) !important; }
      .hover\:shadow-md:hover, .hover\:shadow-lg:hover {
        box-shadow: 0 4px 16px rgba(194,91,110,.1) !important;
      }

      /* Dividers */
      .h-px { background: rgba(0,0,0,.06) !important; background-image: none !important; }

      /* Essence nav */
      .essence-nav-btn {
        background: rgba(255,255,255,.95) !important;
        border: 1px solid rgba(0,0,0,.08) !important;
        color: #3D2E2E !important;
        box-shadow: 0 1px 4px rgba(0,0,0,.06) !important;
        font-size: 12px !important;
      }
      .essence-nav-btn:hover {
        border-color: #C25B6E !important;
        color: #C25B6E !important;
        box-shadow: 0 2px 8px rgba(194,91,110,.12) !important;
        transform: translateY(-1px);
      }
      .essence-nav-btn .dot { background: #C25B6E !important; }
    </style>
