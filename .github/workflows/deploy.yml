name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: src/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --prefix src

      - name: Validate JSON data files
        run: make validate

      - name: Verify production asset graph
        run: make verify-assets

      - name: Type-check and build source
        run: make build

      - name: Build release artifact
        run: make release

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'release'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
