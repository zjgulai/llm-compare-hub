name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: src/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --prefix src

      - name: Run data update acceptance workflow
        run: make data-update-check

      - name: Configure Chrome for UI smoke checks
        shell: bash
        run: |
          set -euo pipefail
          for candidate in google-chrome-stable google-chrome chromium chromium-browser; do
            if command -v "$candidate" >/dev/null 2>&1; then
              chrome_path="$(command -v "$candidate")"
              echo "CHROME_PATH=$chrome_path" >> "$GITHUB_ENV"
              "$chrome_path" --version
              exit 0
            fi
          done
          echo "Chrome or Chromium is required for make smoke-ui" >&2
          exit 1

      - name: Run local UI smoke checks
        run: make smoke-ui

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: 'release'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
