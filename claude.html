<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Claude — LLM 用法精粹</title>
<link rel="canonical" href="https://llm.lute-tlz-dddd.top/claude.html"/>
<style>
  :root {
    --page-bg: #FBF8F5; --surface: #FFFFFF; --elevated: #FFFFFF;
    --text-primary: #231A1A; --text-secondary: #6B6B70; --text-tertiary: #9CA3AF; --text-muted: #C4B8B8;
    --accent-pink: #C25B6E; --accent-pink-light: rgba(194,91,110,.1); --accent-pink-dark: #A84A5A;
    --accent-rose: #C25B6E; --accent-rose-light: rgba(194,91,110,.1);
    --accent-purple: #C25B6E; --accent-purple-light: rgba(194,91,110,.1);
    --accent-warm: #C25B6E; --accent-warm-light: rgba(194,91,110,.1);
    --accent-teal: #C25B6E; --accent-teal-light: rgba(194,91,110,.1);
    --border-default: rgba(0,0,0,.07); --border-light: rgba(0,0,0,.04);
    --shadow-card: 0 1px 3px rgba(0,0,0,.04);
    --shadow-card-hover: 0 4px 16px rgba(194,91,110,.1);
    --font-sans: -apple-system, BlinkMacSystemFont, "Inter", "Noto Sans SC", sans-serif;
    --font-mono: "JetBrains Mono", "SF Mono", "Fira Code", monospace;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-family: var(--font-sans); background: var(--page-bg); color: var(--text-primary); -webkit-font-smoothing: antialiased; }
  body { min-height: 100vh; }

  /* Header — white translucent, no gradient */
  .header {
    background: rgba(255,255,255,0.95);
    border-bottom: 1px solid rgba(0,0,0,.06);
    position: relative; overflow: hidden;
  }
  .header-glow { display: none; }
  .header-accent { display: none; }
  .header-inner { position: relative; z-index: 1; max-width: 1200px; margin: 0 auto; padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
  .header-brand { min-height: 32px; display: flex; align-items: center; gap: 10px; text-decoration: none; }
  .header-brand:hover { opacity: .8; }
  .header-logo { width: 30px; height: 30px; background: rgba(194,91,110,.12); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: #C25B6E; font-weight: 700; font-size: 14px; }
  .header-title { color: #231A1A; font-size: 15px; font-weight: 600; letter-spacing: -.01em; }
  .header-title small { font-size: 12px; font-weight: 400; color: #9CA3AF; margin-left: 4px; }
  .header-nav { display: flex; gap: 2px; }
  .header-nav a { min-height: 32px; display: flex; align-items: center; padding: 5px 14px; border-radius: 6px; font-size: 13px; text-decoration: none; color: #6B6B70; transition: all .15s; }
  .header-nav a:hover { background: rgba(0,0,0,.04); color: #231A1A; }
  .header-nav a.active { background: rgba(194,91,110,.1); color: #C25B6E; font-weight: 500; }

  .hero { max-width: 1200px; margin: 0 auto; padding: 28px 24px 24px; position: relative; z-index: 1; }
  .hero h1 { font-size: 24px; font-weight: 700; color: #231A1A; letter-spacing: -.02em; margin-bottom: 6px; }
  .hero p { font-size: 14px; color: #6B6B70; line-height: 1.6; max-width: 560px; }
  .hero-meta { display: flex; gap: 16px; margin-top: 8px; font-size: 12px; color: #9CA3AF; flex-wrap: wrap; }
  .hero-meta a { color: #6B6B70; text-decoration: none; transition: color .15s; }
  .hero-meta a:hover { color: #C25B6E; }

  /* Section nav */
  .section-nav-wrap { background: rgba(251,248,245,.96); border-bottom: 1px solid rgba(0,0,0,.06); position: sticky; top: 0; z-index: 50; backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
  .section-nav { max-width: 1200px; margin: 0 auto; padding: 10px 24px; display: flex; gap: 6px; overflow-x: auto; scrollbar-width: none; }
  .section-nav::-webkit-scrollbar { display: none; }
  .section-tab { min-height: 32px; padding: 6px 16px; border-radius: 6px; font-size: 13px; font-weight: 500; cursor: pointer; border: 1px solid rgba(0,0,0,.08); background: transparent; color: var(--text-secondary); white-space: nowrap; transition: all .15s; flex-shrink: 0; }
  .section-tab:hover { background: rgba(194,91,110,.07); color: #C25B6E; border-color: rgba(194,91,110,.25); }
  .section-tab.active { background: #C25B6E; color: #fff; border-color: #C25B6E; }

  /* Content */
  .content-wrap { max-width: 1200px; margin: 0 auto; padding: 32px 24px 56px; }
  .section { display: none; }
  .section.active { display: block; }
  .section-header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
  .section-indicator { width: 3px; height: 18px; border-radius: 2px; flex-shrink: 0; background: #C25B6E; }
  .section h2 { font-size: 17px; font-weight: 600; color: var(--text-primary); letter-spacing: -.01em; }
  .section-desc { font-size: 13px; color: var(--text-tertiary); margin-top: 2px; }

  /* Cards */
  .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 12px; }
  .card { background: #fff; border: 1px solid var(--border-default); border-radius: 10px; padding: 20px; transition: border-color .15s, box-shadow .15s; display: flex; flex-direction: column; gap: 10px; box-shadow: var(--shadow-card); }
  .card:hover { box-shadow: var(--shadow-card-hover); border-color: rgba(194,91,110,.25); }
  .card-title { font-size: 14px; font-weight: 600; line-height: 1.45; }
  .card-title a { min-height: 32px; display: inline-flex; align-items: center; color: var(--text-primary); text-decoration: none; }
  .card-title a:hover { color: #C25B6E; }
  .card-meta { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .card-source { font-size: 11px; padding: 2px 7px; border-radius: 4px; font-weight: 500; letter-spacing: .01em; }
  .card-source.official  { background: rgba(194,91,110,.1); color: #A84A5A; }
  .card-source.community { background: rgba(0,0,0,.04); color: #6B6B70; }
  .card-source.aiho      { background: rgba(0,0,0,.04); color: #3D2E2E; }
  .card-score { font-size: 11px; padding: 2px 7px; border-radius: 4px; background: #F0FDF4; color: #166534; font-weight: 600; font-family: var(--font-mono); }
  .card-tags { display: flex; gap: 4px; flex-wrap: wrap; }
  .card-tag { font-size: 11px; padding: 1px 6px; border-radius: 4px; background: rgba(0,0,0,.03); color: var(--text-tertiary); border: 1px solid rgba(0,0,0,.06); }
  .card-summary { font-size: 13px; color: var(--text-secondary); line-height: 1.55; }

  .footer { max-width: 1200px; margin: 0 auto; padding: 24px; text-align: center; border-top: 1px solid var(--border-default); font-size: 12px; color: var(--text-tertiary); }
  .footer a { color: var(--text-secondary); text-decoration: none; }
  .footer a:hover { color: #C25B6E; text-decoration: underline; }

  .loading { display: flex; align-items: center; justify-content: center; padding: 80px 24px; color: var(--text-tertiary); font-size: 14px; }
  .loading-spinner { width: 20px; height: 20px; border: 2px solid rgba(0,0,0,.08); border-top-color: #C25B6E; border-radius: 50%; animation: spin .6s linear infinite; margin-right: 10px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  @media (max-width: 640px) { .hero { padding: 20px 16px 16px; } .hero h1 { font-size: 20px; } .header-inner { padding: 12px 16px; } .card-grid { grid-template-columns: 1fr; } .section-nav { padding: 8px 16px; } .content-wrap { padding: 24px 16px 40px; } .section-tab { font-size: 12px; padding: 5px 12px; } }
</style>
</head>
<body>

<header class="header">
  <div class="header-glow"></div>
  <div class="header-accent"></div>
  <div class="header-inner">
    <a class="header-brand" href="https://llm.lute-tlz-dddd.top/">
      <span class="header-logo">L</span>
      <span class="header-title">Claude <small>用法精粹</small></span>
    </a>
    <nav class="header-nav" aria-label="站点导航">
      <a href="https://llm.lute-tlz-dddd.top/">模型选型</a>
      <a href="claude.html" class="active" aria-current="page">Claude</a>
      <a href="codex.html" class="">Codex</a>
    </nav>
  </div>
  <div class="hero" id="hero">
    <h1 id="page-title">Claude 用法精粹</h1>
    <p id="page-subtitle">Anthropic Claude 使用技巧、最佳实践与资源导航</p>
    <div class="hero-meta" id="hero-meta">
      <span>最后更新: <span id="last-updated">—</span></span>
      <span>·</span>
      <span>数据来源: <a id="source-aiho" href="https://aihot.virxact.com/">aiho.virxact.com</a> + <a id="source-blog" href="https://www.anthropic.com/blog">官方博客</a></span>
    </div>
  </div>
</header>

<nav class="section-nav-wrap" aria-label="内容分类"><div class="section-nav" id="section-nav" role="tablist"></div></nav>
<main class="content-wrap" id="content" tabindex="-1"><div class="loading" id="loading"><div class="loading-spinner"></div><span>加载中...</span></div></main>

<footer class="footer">
  <p>数据来源: <a href="https://aihot.virxact.com/">AIHOT</a> · <a href="https://www.anthropic.com/blog">官方博客</a> · <a href="https://platform.claude.com/docs">官方文档</a></p>
  <p style="margin-top:4px;font-size:12px"><a href="https://llm.lute-tlz-dddd.top/">LLM Compare Hub</a> — 大模型选型指南 &amp; 用法精粹</p>
</footer>

<script>
const DATA_FILE = './claude-data.json';
const accentColors = {
  pink: ['var(--accent-pink)', 'var(--accent-pink-light)'],
  rose: ['var(--accent-rose)', 'var(--accent-rose-light)'],
  purple: ['var(--accent-purple)', 'var(--accent-purple-light)'],
  warm: ['var(--accent-warm)', 'var(--accent-warm-light)'],
  teal: ['var(--accent-teal)', 'var(--accent-teal-light)'],
};

function toDomId(value) {
  return String(value).replace(/[^a-zA-Z0-9_-]+/g, '-').replace(/^-|-$/g, '') || 'item';
}

function setActiveSection(sectionId) {
  document.querySelectorAll('.section').forEach((el) => {
    const active = el.id === 'section-' + sectionId;
    el.classList.toggle('active', active);
    el.hidden = !active;
  });
  document.querySelectorAll('.section-tab').forEach((el) => {
    const active = el.getAttribute('aria-controls') === 'section-' + sectionId;
    el.classList.toggle('active', active);
    el.setAttribute('aria-selected', active ? 'true' : 'false');
    el.tabIndex = active ? 0 : -1;
  });
}

async function load() {
  try {
    const resp = await fetch(DATA_FILE);
    const data = await resp.json();
    document.getElementById('last-updated').textContent = data.updatedAt;
    document.getElementById('page-subtitle').textContent = data.subtitle;
    if (data.page) document.title = data.title + ' — LLM 用法精粹';
    const nav = document.getElementById('section-nav');
    data.sections.forEach((s, i) => {
      const btn = document.createElement('button');
      btn.className = 'section-tab' + (i === 0 ? ' active' : '');
      btn.type = 'button';
      btn.id = 'section-tab-' + toDomId(s.id);
      btn.setAttribute('role', 'tab');
      btn.setAttribute('aria-selected', i === 0 ? 'true' : 'false');
      btn.setAttribute('aria-controls', 'section-' + s.id);
      btn.tabIndex = i === 0 ? 0 : -1;
      btn.textContent = s.name;
      btn.onclick = () => setActiveSection(s.id);
      btn.onkeydown = (event) => {
        const tabs = Array.from(document.querySelectorAll('.section-tab'));
        const current = tabs.indexOf(btn);
        let next = current;
        if (event.key === 'ArrowRight') next = current === tabs.length - 1 ? 0 : current + 1;
        else if (event.key === 'ArrowLeft') next = current === 0 ? tabs.length - 1 : current - 1;
        else if (event.key === 'Home') next = 0;
        else if (event.key === 'End') next = tabs.length - 1;
        else return;
        event.preventDefault();
        tabs[next].focus();
        setActiveSection(data.sections[next].id);
      };
      nav.appendChild(btn);
    });
    const content = document.getElementById('content');
    content.innerHTML = '';
    data.sections.forEach((section, si) => {
      const sec = document.createElement('section');
      sec.className = 'section' + (si === 0 ? ' active' : '');
      sec.id = 'section-' + section.id;
      sec.setAttribute('role', 'tabpanel');
      sec.setAttribute('aria-labelledby', 'section-tab-' + toDomId(section.id));
      sec.hidden = si !== 0;
      const colors = accentColors[section.color] || accentColors.pink;
      sec.innerHTML = '<div class="section-header"><div class="section-indicator" style="background:'+colors[0]+'"></div><div><h2>'+section.name+'</h2><div class="section-desc">'+(section.description||'')+'</div></div></div><div class="card-grid">'+section.items.map(function(item){
        const sc = item.recommendedBy === 'aiho' ? 'aiho' : (item.source||'').includes('官方') ? 'official' : 'community';
        const cardId = 'essence-card-' + toDomId(section.id + '-' + item.title);
        return '<article class="card" role="article" data-essence-card="true" aria-labelledby="'+cardId+'"><h3 class="card-title" id="'+cardId+'"><a href="'+item.url+'" target="_blank" rel="noopener">'+item.title+'</a></h3><div class="card-meta"><span class="card-source '+sc+'">'+(item.source||(item.recommendedBy||'社区'))+'</span>'+(item.score?'<span class="card-score">✦ '+item.score+'</span>':'')+'</div>'+(item.tags&&item.tags.length?'<div class="card-tags">'+item.tags.slice(0,4).map(function(t){return '<span class="card-tag">'+t+'</span>';}).join('')+'</div>':'')+(item.summary?'<div class="card-summary">'+item.summary+'</div>':'')+'</article>';
      }).join('')+'</div>';
      content.appendChild(sec);
    });
  } catch(e) {
    document.getElementById('content').innerHTML = '<div class="loading" style="color:var(--accent-pink)">⚠️ 数据加载失败: '+e.message+'</div>';
  }
}
load();
</script>
</body>
</html>
