<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>{PAGE_TITLE} — LLM 用法精粹</title>
<link rel="canonical" href="{CANONICAL_URL}"/>
<style>
  :root {
    --page-bg: #fdf2f8; --surface: #fce7f3; --elevated: #ffffff;
    --text-primary: #1a0a1d; --text-secondary: #6b3a5a; --text-tertiary: #a47a8f; --text-muted: #d4aabf;
    --accent-pink: #ec4899; --accent-pink-light: #fce7f3; --accent-pink-dark: #be185d;
    --accent-rose: #f43f5e; --accent-rose-light: #fff1f2;
    --accent-purple: #a855f7; --accent-purple-light: #f3e8ff;
    --accent-warm: #f97316; --accent-warm-light: #fff7ed;
    --accent-teal: #14b8a6; --accent-teal-light: #f0fdfa;
    --border-default: #fbcfe8; --border-light: #fce7f3;
    --shadow-card: 0 1px 3px 0 rgba(0,0,0,.04), 0 1px 2px -1px rgba(0,0,0,.04);
    --shadow-card-hover: 0 12px 24px -8px rgba(190,24,93,.1), 0 4px 8px -4px rgba(190,24,93,.06);
    --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", "Inter", "Noto Sans SC", sans-serif;
    --font-mono: "JetBrains Mono", "SF Mono", "Fira Code", monospace;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-family: var(--font-sans); background: var(--page-bg); color: var(--text-primary); -webkit-font-smoothing: antialiased; }
  body { min-height: 100vh; }

  /* Pink gradient header */
  .header {
    background: linear-gradient(135deg,#BE185D 0%,#EC4899 50%,#F472B6 100%);
    position: relative; overflow: hidden;
  }
  .header-glow { position: absolute; top: 0; left: 0; right: 0; height: 200px; background: radial-gradient(ellipse 70% 60% at 50% -10%,rgba(244,114,182,.3),transparent); pointer-events: none; }
  .header-accent { position: absolute; top: -100px; right: -100px; width: 400px; height: 400px; background: radial-gradient(circle,rgba(236,72,153,.2),transparent 70%); filter: blur(60px); pointer-events: none; }
  .header-inner { position: relative; z-index: 1; max-width: 1200px; margin: 0 auto; padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
  .header-brand { min-height: 32px; display: flex; align-items: center; gap: 12px; text-decoration: none; }
  .header-brand:hover { opacity: .85; }
  .header-logo { width: 34px; height: 34px; background: #fff; border-radius: 10px; display: flex; align-items: center; justify-content: center; color: #BE185D; font-weight: 700; font-size: 16px; box-shadow: 0 2px 8px rgba(190,24,93,.2); }
  .header-title { color: #fff; font-size: 18px; font-weight: 600; text-shadow: 0 1px 4px rgba(0,0,0,.1); }
  .header-title small { font-size: 13px; font-weight: 400; color: #fbcfe8; }
  .header-nav { display: flex; gap: 8px; }
  .header-nav a { min-height: 32px; display: flex; align-items: center; padding: 6px 16px; border-radius: 8px; font-size: 13px; text-decoration: none; background: rgba(255,255,255,.15); border: 1px solid rgba(255,255,255,.2); color: #fce7f3; transition: all .15s; }
  .header-nav a:hover { background: rgba(255,255,255,.25); color: #fff; }
  .header-nav a.active { background: rgba(255,255,255,.9); border-color: #fff; color: #BE185D; font-weight: 500; }

  .hero { max-width: 1200px; margin: 0 auto; padding: 40px 24px 32px; position: relative; z-index: 1; }
  .hero h1 { font-size: 30px; font-weight: 700; color: #fff; letter-spacing: -.02em; margin-bottom: 6px; text-shadow: 0 1px 4px rgba(0,0,0,.1); }
  .hero p { font-size: 14px; color: #fce7f3; line-height: 1.6; max-width: 600px; }
  .hero-meta { display: flex; gap: 20px; margin-top: 10px; font-size: 12px; color: #fbcfe8; flex-wrap: wrap; }
  .hero-meta a { color: #fff; text-decoration: underline; text-underline-offset: 2px; }
  .hero-meta a:hover { opacity: .8; }

  /* Section nav */
  .section-nav-wrap { background: #fff; border-bottom: 1px solid var(--border-default); position: sticky; top: 0; z-index: 50; }
  .section-nav { max-width: 1200px; margin: 0 auto; padding: 12px 24px; display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; }
  .section-nav::-webkit-scrollbar { display: none; }
  .section-tab { min-height: 32px; padding: 7px 18px; border-radius: 100px; font-size: 13px; font-weight: 500; cursor: pointer; border: 1px solid var(--border-default); background: #fff; color: var(--text-secondary); white-space: nowrap; transition: all .15s; flex-shrink: 0; }
  .section-tab:hover { border-color: var(--accent-pink); color: var(--accent-pink); }
  .section-tab.active { background: var(--accent-pink); color: #fff; border-color: var(--accent-pink); }

  /* Content */
  .content-wrap { max-width: 1200px; margin: 0 auto; padding: 32px 24px 48px; }
  .section { display: none; }
  .section.active { display: block; }
  .section-header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
  .section-indicator { width: 4px; height: 26px; border-radius: 2px; flex-shrink: 0; }
  .section h2 { font-size: 20px; font-weight: 600; color: var(--text-primary); }
  .section-desc { font-size: 13px; color: var(--text-tertiary); margin-top: 1px; }

  /* Cards */
  .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 16px; }
  .card { background: #fff; border: 1px solid var(--border-default); border-radius: 12px; padding: 20px; transition: box-shadow .2s, border-color .2s; display: flex; flex-direction: column; gap: 10px; box-shadow: var(--shadow-card); }
  .card:hover { box-shadow: var(--shadow-card-hover); border-color: var(--accent-pink); }
  .card-title { font-size: 15px; font-weight: 600; line-height: 1.4; }
  .card-title a { min-height: 32px; display: inline-flex; align-items: center; color: var(--text-primary); text-decoration: none; }
  .card-title a:hover { color: var(--accent-pink); }
  .card-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .card-source { font-size: 11px; padding: 2px 8px; border-radius: 4px; font-weight: 500; letter-spacing: .01em; }
  .card-source.official { background: var(--accent-pink-light); color: var(--accent-pink-dark); }
  .card-source.community { background: var(--accent-purple-light); color: var(--accent-purple); }
  .card-source.aiho { background: var(--accent-warm-light); color: var(--accent-warm); }
  .card-score { font-size: 11px; padding: 2px 7px; border-radius: 4px; background: #f0fdf4; color: #15803d; font-weight: 600; font-family: var(--font-mono); }
  .card-tags { display: flex; gap: 4px; flex-wrap: wrap; }
  .card-tag { font-size: 11px; padding: 1px 6px; border-radius: 4px; background: var(--surface); color: var(--text-tertiary); }
  .card-summary { font-size: 13px; color: var(--text-secondary); line-height: 1.5; }

  .footer { max-width: 1200px; margin: 0 auto; padding: 24px; text-align: center; border-top: 1px solid var(--border-default); font-size: 13px; color: var(--text-tertiary); }
  .footer a { color: var(--accent-pink); text-decoration: none; }
  .footer a:hover { text-decoration: underline; }

  .loading { display: flex; align-items: center; justify-content: center; padding: 80px 24px; color: var(--text-tertiary); font-size: 15px; }
  .loading-spinner { width: 24px; height: 24px; border: 2px solid var(--border-default); border-top-color: var(--accent-pink); border-radius: 50%; animation: spin .6s linear infinite; margin-right: 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  @media (max-width: 640px) { .hero { padding: 32px 16px 24px; } .hero h1 { font-size: 24px; } .header-inner { padding: 12px 16px; } .card-grid { grid-template-columns: 1fr; } .section-nav { padding: 12px 16px; } .content-wrap { padding: 24px 16px 32px; } .section-tab { font-size: 12px; padding: 6px 14px; } }
</style>
</head>
<body>

<header class="header">
  <div class="header-glow"></div>
  <div class="header-accent"></div>
  <div class="header-inner">
    <a class="header-brand" href="https://llm.lute-tlz-dddd.top/">
      <span class="header-logo">L</span>
      <span class="header-title">{PAGE_TITLE} <small>用法精粹</small></span>
    </a>
    <nav class="header-nav" aria-label="站点导航">
      <a href="https://llm.lute-tlz-dddd.top/">模型选型</a>
      <a href="claude.html" class="{CLAUDE_ACTIVE}" {CLAUDE_CURRENT}>Claude</a>
      <a href="codex.html" class="{CODEX_ACTIVE}" {CODEX_CURRENT}>Codex</a>
    </nav>
  </div>
  <div class="hero" id="hero">
    <h1 id="page-title">{PAGE_TITLE} 用法精粹</h1>
    <p id="page-subtitle">{PAGE_SUBTITLE}</p>
    <div class="hero-meta" id="hero-meta">
      <span>最后更新: <span id="last-updated">—</span></span>
      <span>·</span>
      <span>数据来源: <a id="source-aiho" href="https://aihot.virxact.com/">aiho.virxact.com</a> + <a id="source-blog" href="{BLOG_URL}">官方博客</a></span>
    </div>
  </div>
</header>

<nav class="section-nav-wrap" aria-label="内容分类"><div class="section-nav" id="section-nav" role="tablist"></div></nav>
<main class="content-wrap" id="content" tabindex="-1"><div class="loading" id="loading"><div class="loading-spinner"></div><span>加载中...</span></div></main>

<footer class="footer">
  <p>数据来源: <a href="https://aihot.virxact.com/">AIHOT</a> · <a href="{BLOG_URL}">官方博客</a> · <a href="{DOCS_URL}">官方文档</a></p>
  <p style="margin-top:4px;font-size:12px"><a href="https://llm.lute-tlz-dddd.top/">LLM Compare Hub</a> — 大模型选型指南 &amp; 用法精粹</p>
</footer>

<script>
const DATA_FILE = '{DATA_FILE}';
const accentColors = {
  pink: ['var(--accent-pink)', 'var(--accent-pink-light)'],
  rose: ['var(--accent-rose)', 'var(--accent-rose-light)'],
  purple: ['var(--accent-purple)', 'var(--accent-purple-light)'],
  warm: ['var(--accent-warm)', 'var(--accent-warm-light)'],
  teal: ['var(--accent-teal)', 'var(--accent-teal-light)'],
};

function toDomId(value) {
  return String(value).replace(/[^a-zA-Z0-9_-]+/g, '-').replace(/^-|-$/g, '') || 'item';
}

function setActiveSection(sectionId) {
  document.querySelectorAll('.section').forEach((el) => {
    const active = el.id === 'section-' + sectionId;
    el.classList.toggle('active', active);
    el.hidden = !active;
  });
  document.querySelectorAll('.section-tab').forEach((el) => {
    const active = el.getAttribute('aria-controls') === 'section-' + sectionId;
    el.classList.toggle('active', active);
    el.setAttribute('aria-selected', active ? 'true' : 'false');
    el.tabIndex = active ? 0 : -1;
  });
}

async function load() {
  try {
    const resp = await fetch(DATA_FILE);
    const data = await resp.json();
    document.getElementById('last-updated').textContent = data.updatedAt;
    document.getElementById('page-subtitle').textContent = data.subtitle;
    if (data.page) document.title = data.title + ' — LLM 用法精粹';
    const nav = document.getElementById('section-nav');
    data.sections.forEach((s, i) => {
      const btn = document.createElement('button');
      btn.className = 'section-tab' + (i === 0 ? ' active' : '');
      btn.type = 'button';
      btn.id = 'section-tab-' + toDomId(s.id);
      btn.setAttribute('role', 'tab');
      btn.setAttribute('aria-selected', i === 0 ? 'true' : 'false');
      btn.setAttribute('aria-controls', 'section-' + s.id);
      btn.tabIndex = i === 0 ? 0 : -1;
      btn.textContent = s.name;
      btn.onclick = () => setActiveSection(s.id);
      btn.onkeydown = (event) => {
        const tabs = Array.from(document.querySelectorAll('.section-tab'));
        const current = tabs.indexOf(btn);
        let next = current;
        if (event.key === 'ArrowRight') next = current === tabs.length - 1 ? 0 : current + 1;
        else if (event.key === 'ArrowLeft') next = current === 0 ? tabs.length - 1 : current - 1;
        else if (event.key === 'Home') next = 0;
        else if (event.key === 'End') next = tabs.length - 1;
        else return;
        event.preventDefault();
        tabs[next].focus();
        setActiveSection(data.sections[next].id);
      };
      nav.appendChild(btn);
    });
    const content = document.getElementById('content');
    content.innerHTML = '';
    data.sections.forEach((section, si) => {
      const sec = document.createElement('section');
      sec.className = 'section' + (si === 0 ? ' active' : '');
      sec.id = 'section-' + section.id;
      sec.setAttribute('role', 'tabpanel');
      sec.setAttribute('aria-labelledby', 'section-tab-' + toDomId(section.id));
      sec.hidden = si !== 0;
      const colors = accentColors[section.color] || accentColors.pink;
      sec.innerHTML = '<div class="section-header"><div class="section-indicator" style="background:'+colors[0]+'"></div><div><h2>'+section.name+'</h2><div class="section-desc">'+(section.description||'')+'</div></div></div><div class="card-grid">'+section.items.map(function(item){
        const sc = item.recommendedBy === 'aiho' ? 'aiho' : (item.source||'').includes('官方') ? 'official' : 'community';
        const cardId = 'essence-card-' + toDomId(section.id + '-' + item.title);
        return '<article class="card" role="article" data-essence-card="true" aria-labelledby="'+cardId+'"><h3 class="card-title" id="'+cardId+'"><a href="'+item.url+'" target="_blank" rel="noopener">'+item.title+'</a></h3><div class="card-meta"><span class="card-source '+sc+'">'+(item.source||(item.recommendedBy||'社区'))+'</span>'+(item.score?'<span class="card-score">✦ '+item.score+'</span>':'')+'</div>'+(item.tags&&item.tags.length?'<div class="card-tags">'+item.tags.slice(0,4).map(function(t){return '<span class="card-tag">'+t+'</span>';}).join('')+'</div>':'')+(item.summary?'<div class="card-summary">'+item.summary+'</div>':'')+'</article>';
      }).join('')+'</div>';
      content.appendChild(sec);
    });
  } catch(e) {
    document.getElementById('content').innerHTML = '<div class="loading" style="color:var(--accent-pink)">⚠️ 数据加载失败: '+e.message+'</div>';
  }
}
load();
</script>
</body>
</html>
