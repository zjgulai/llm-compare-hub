<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Codex — LLM 用法精粹</title>
<link rel="canonical" href="https://llm.lute-tlz-dddd.top/codex.html"/>
<style>
  :root {
    --page-bg: #FAFAFA; --surface: #FFFFFF; --elevated: #FFFFFF;
    --text-primary: #111827; --text-secondary: #6B7280; --text-tertiary: #9CA3AF; --text-muted: #D1D5DB;
    --accent-pink: #4F46E5; --accent-pink-light: #EEF2FF; --accent-pink-dark: #3730A3;
    --accent-rose: #4F46E5; --accent-rose-light: #EEF2FF;
    --accent-purple: #4F46E5; --accent-purple-light: #EEF2FF;
    --accent-warm: #4F46E5; --accent-warm-light: #EEF2FF;
    --accent-teal: #4F46E5; --accent-teal-light: #EEF2FF;
    --border-default: #E5E7EB; --border-light: #F3F4F6;
    --shadow-card: 0 1px 2px rgba(0,0,0,.04);
    --shadow-card-hover: 0 4px 16px rgba(0,0,0,.08);
    --font-sans: -apple-system, BlinkMacSystemFont, "Inter", "Noto Sans SC", sans-serif;
    --font-mono: "JetBrains Mono", "SF Mono", "Fira Code", monospace;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-family: var(--font-sans); background: var(--page-bg); color: var(--text-primary); -webkit-font-smoothing: antialiased; }
  body { min-height: 100vh; }

  .header { background: #111827; position: relative; overflow: hidden; }
  .header-glow { display: none; }
  .header-accent { display: none; }
  .header-inner { position: relative; z-index: 1; max-width: 1200px; margin: 0 auto; padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
  .header-brand { display: flex; align-items: center; gap: 12px; text-decoration: none; }
  .header-brand:hover { opacity: .8; }
  .header-logo { width: 32px; height: 32px; background: rgba(255,255,255,.1); border-radius: 8px; border: 1px solid rgba(255,255,255,.12); display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 700; font-size: 15px; }
  .header-title { color: #fff; font-size: 16px; font-weight: 600; letter-spacing: -.01em; }
  .header-title small { font-size: 12px; font-weight: 400; color: rgba(255,255,255,.45); margin-left: 4px; }
  .header-nav { display: flex; gap: 4px; }
  .header-nav a { padding: 5px 14px; border-radius: 6px; font-size: 13px; text-decoration: none; color: rgba(255,255,255,.55); transition: all .15s; }
  .header-nav a:hover { background: rgba(255,255,255,.08); color: rgba(255,255,255,.9); }
  .header-nav a.active { background: rgba(255,255,255,.12); color: #fff; font-weight: 500; }

  .hero { max-width: 1200px; margin: 0 auto; padding: 32px 24px 28px; position: relative; z-index: 1; }
  .hero h1 { font-size: 26px; font-weight: 700; color: #fff; letter-spacing: -.02em; margin-bottom: 6px; }
  .hero p { font-size: 14px; color: rgba(255,255,255,.5); line-height: 1.6; max-width: 560px; }
  .hero-meta { display: flex; gap: 16px; margin-top: 10px; font-size: 12px; color: rgba(255,255,255,.35); flex-wrap: wrap; }
  .hero-meta a { color: rgba(255,255,255,.6); text-decoration: none; transition: color .15s; }
  .hero-meta a:hover { color: #fff; }

  .section-nav-wrap { background: rgba(250,250,250,.95); border-bottom: 1px solid var(--border-default); position: sticky; top: 0; z-index: 50; backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
  .section-nav { max-width: 1200px; margin: 0 auto; padding: 10px 24px; display: flex; gap: 6px; overflow-x: auto; scrollbar-width: none; }
  .section-nav::-webkit-scrollbar { display: none; }
  .section-tab { padding: 6px 16px; border-radius: 6px; font-size: 13px; font-weight: 500; cursor: pointer; border: 1px solid var(--border-default); background: transparent; color: var(--text-secondary); white-space: nowrap; transition: all .15s; flex-shrink: 0; }
  .section-tab:hover { border-color: #9CA3AF; color: var(--text-primary); background: #F3F4F6; }
  .section-tab.active { background: #111827; color: #fff; border-color: #111827; }

  .content-wrap { max-width: 1200px; margin: 0 auto; padding: 32px 24px 56px; }
  .section { display: none; }
  .section.active { display: block; }
  .section-header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
  .section-indicator { width: 3px; height: 20px; border-radius: 2px; flex-shrink: 0; background: #111827; }
  .section h2 { font-size: 18px; font-weight: 600; color: var(--text-primary); letter-spacing: -.01em; }
  .section-desc { font-size: 13px; color: var(--text-tertiary); margin-top: 2px; }

  .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 12px; }
  .card { background: #fff; border: 1px solid var(--border-default); border-radius: 10px; padding: 20px; transition: border-color .15s, box-shadow .15s; display: flex; flex-direction: column; gap: 10px; box-shadow: var(--shadow-card); }
  .card:hover { box-shadow: var(--shadow-card-hover); border-color: #9CA3AF; }
  .card-title { font-size: 14px; font-weight: 600; line-height: 1.45; }
  .card-title a { color: var(--text-primary); text-decoration: none; }
  .card-title a:hover { color: #4F46E5; }
  .card-meta { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .card-source { font-size: 11px; padding: 2px 7px; border-radius: 4px; font-weight: 500; letter-spacing: .01em; }
  .card-source.official  { background: #EEF2FF; color: #4338CA; }
  .card-source.community { background: #F3F4F6; color: #6B7280; }
  .card-source.aiho      { background: #F3F4F6; color: #374151; }
  .card-score { font-size: 11px; padding: 2px 7px; border-radius: 4px; background: #F0FDF4; color: #166534; font-weight: 600; font-family: var(--font-mono); }
  .card-tags { display: flex; gap: 4px; flex-wrap: wrap; }
  .card-tag { font-size: 11px; padding: 1px 6px; border-radius: 4px; background: #F9FAFB; color: var(--text-tertiary); border: 1px solid #E5E7EB; }
  .card-summary { font-size: 13px; color: var(--text-secondary); line-height: 1.55; }

  .footer { max-width: 1200px; margin: 0 auto; padding: 24px; text-align: center; border-top: 1px solid var(--border-default); font-size: 12px; color: var(--text-tertiary); }
  .footer a { color: var(--text-secondary); text-decoration: none; }
  .footer a:hover { color: var(--text-primary); text-decoration: underline; }

  .loading { display: flex; align-items: center; justify-content: center; padding: 80px 24px; color: var(--text-tertiary); font-size: 14px; }
  .loading-spinner { width: 20px; height: 20px; border: 2px solid #E5E7EB; border-top-color: #111827; border-radius: 50%; animation: spin .6s linear infinite; margin-right: 10px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  @media (max-width: 640px) { .hero { padding: 24px 16px 20px; } .hero h1 { font-size: 22px; } .header-inner { padding: 12px 16px; } .card-grid { grid-template-columns: 1fr; } .section-nav { padding: 8px 16px; } .content-wrap { padding: 24px 16px 40px; } .section-tab { font-size: 12px; padding: 5px 12px; } }
</style>
</head>
<body>

<div class="header">
  <div class="header-glow"></div>
  <div class="header-accent"></div>
  <div class="header-inner">
    <a class="header-brand" href="https://llm.lute-tlz-dddd.top/">
      <span class="header-logo">L</span>
      <span class="header-title">Codex <small>用法精粹</small></span>
    </a>
    <nav class="header-nav">
      <a href="https://llm.lute-tlz-dddd.top/">模型选型</a>
      <a href="claude.html" class="">Claude</a>
      <a href="codex.html" class="active">Codex</a>
    </nav>
  </div>
  <div class="hero" id="hero">
    <h1 id="page-title">Codex 用法精粹</h1>
    <p id="page-subtitle">OpenAI Codex 使用技巧、最佳实践与资源导航</p>
    <div class="hero-meta" id="hero-meta">
      <span>最后更新: <span id="last-updated">—</span></span>
      <span>·</span>
      <span>数据来源: <a id="source-aiho" href="https://aihot.virxact.com/">aiho.virxact.com</a> + <a id="source-blog" href="https://openai.com/blog">官方博客</a></span>
    </div>
  </div>
</div>

<div class="section-nav-wrap"><div class="section-nav" id="section-nav"></div></div>
<div class="content-wrap" id="content"><div class="loading" id="loading"><div class="loading-spinner"></div><span>加载中...</span></div></div>

<div class="footer">
  <p>数据来源: <a href="https://aihot.virxact.com/">AIHOT</a> · <a href="https://openai.com/blog">官方博客</a> · <a href="https://platform.openai.com/docs">官方文档</a></p>
  <p style="margin-top:4px;font-size:12px"><a href="https://llm.lute-tlz-dddd.top/">LLM Compare Hub</a> — 大模型选型指南 &amp; 用法精粹</p>
</div>

<script>
const DATA_FILE = './codex-data.json';
const accentColors = {
  pink: ['var(--accent-pink)', 'var(--accent-pink-light)'],
  rose: ['var(--accent-rose)', 'var(--accent-rose-light)'],
  purple: ['var(--accent-purple)', 'var(--accent-purple-light)'],
  warm: ['var(--accent-warm)', 'var(--accent-warm-light)'],
  teal: ['var(--accent-teal)', 'var(--accent-teal-light)'],
};

async function load() {
  try {
    const resp = await fetch(DATA_FILE);
    const data = await resp.json();
    document.getElementById('last-updated').textContent = data.updatedAt;
    document.getElementById('page-subtitle').textContent = data.subtitle;
    if (data.page) document.title = data.title + ' — LLM 用法精粹';
    const nav = document.getElementById('section-nav');
    data.sections.forEach((s, i) => {
      const btn = document.createElement('button');
      btn.className = 'section-tab' + (i === 0 ? ' active' : '');
      btn.textContent = s.name;
      btn.onclick = () => { document.querySelectorAll('.section').forEach(el => el.classList.remove('active')); document.querySelectorAll('.section-tab').forEach(el => el.classList.remove('active')); document.getElementById('section-' + s.id).classList.add('active'); btn.classList.add('active'); };
      nav.appendChild(btn);
    });
    const content = document.getElementById('content');
    content.innerHTML = '';
    data.sections.forEach((section, si) => {
      const sec = document.createElement('div');
      sec.className = 'section' + (si === 0 ? ' active' : '');
      sec.id = 'section-' + section.id;
      const colors = accentColors[section.color] || accentColors.pink;
      sec.innerHTML = '<div class="section-header"><div class="section-indicator" style="background:'+colors[0]+'"></div><div><h2>'+section.name+'</h2><div class="section-desc">'+(section.description||'')+'</div></div></div><div class="card-grid">'+section.items.map(function(item){
        const sc = item.recommendedBy === 'aiho' ? 'aiho' : (item.source||'').includes('官方') ? 'official' : 'community';
        return '<div class="card"><div class="card-title"><a href="'+item.url+'" target="_blank" rel="noopener">'+item.title+'</a></div><div class="card-meta"><span class="card-source '+sc+'">'+(item.source||(item.recommendedBy||'社区'))+'</span>'+(item.score?'<span class="card-score">✦ '+item.score+'</span>':'')+'</div>'+(item.tags&&item.tags.length?'<div class="card-tags">'+item.tags.slice(0,4).map(function(t){return '<span class="card-tag">'+t+'</span>';}).join('')+'</div>':'')+(item.summary?'<div class="card-summary">'+item.summary+'</div>':'')+'</div>';
      }).join('')+'</div>';
      content.appendChild(sec);
    });
  } catch(e) {
    document.getElementById('content').innerHTML = '<div class="loading" style="color:var(--accent-pink)">⚠️ 数据加载失败: '+e.message+'</div>';
  }
}
load();
</script>
</body>
</html>
